/laserscan_node: # should match node name but both blue and yellow versions need to use this
  ros__parameters:
    # 1. Coordinate frame alignment (Change to your robot's base or odom frame)
    target_frame: base_footprint
    transform_tolerance: 0.01

    # 2. Height filtering box (Widen this if your data is disappearing)
    min_height: -0.5   # 0.5 meters below the target_frame
    max_height: 1.5    # 1.5 meters above the target_frame

    # 3. Horizontal Field of view (Set to -3.1415 / 3.1415 for full 360 degree LiDAR)
    angle_min: -1.5708  # -90 degrees
    angle_max: 1.5708   # +90 degrees
    angle_increment: 0.0087 # ~0.05 degree resolution

    # 4. Range limits
    range_min: 0.1
    range_max: 10000.0
    use_inf: true
    